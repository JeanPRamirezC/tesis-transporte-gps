services:
  postgres:
    image: postgres:16
    container_name: tesis_gps_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tesis_transporte_gps
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - tesis_gps_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: tesis_gps_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tesis.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  tesis_gps_postgres_data: